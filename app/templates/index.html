<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wine Quality Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <div class="container">

    <h1>Wine Quality Prediction</h1>
    <form action="/predict" method="POST">
        <label>Fixed Acidity</label>
<input
    type="number"
    step="any"
    name="fixed_acidity"
    placeholder="Enter Fixed Acidity"
    required>

<label>Volatile Acidity</label>
<input
    type="number"
    step="any"
    name="volatile_acidity"
    placeholder="Enter Volatile Acidity"
    required>

<label>Citric Acid</label>
<input
    type="number"
    step="any"
    name="citric_acid"
    placeholder="Enter Citric Acid"
    required>

<label>Residual Sugar</label>
<input
    type="number"
    step="any"
    name="residual_sugar"
    placeholder="Enter Residual Sugar"
    required>

<label>Chlorides</label>
<input
    type="number"
    step="any"
    name="chlorides"
    placeholder="Enter Chlorides"
    required>

<label>Free Sulfur Dioxide</label>
<input
    type="number"
    step="any"
    name="free_sulfur_dioxide"
    placeholder="Enter Free Sulfur Dioxide"
    required>

<label>Total Sulfur Dioxide</label>
<input
    type="number"
    step="any"
    name="total_sulfur_dioxide"
    placeholder="Enter Total Sulfur Dioxide"
    required>

<label>Density</label>
<input
    type="number"
    step="any"
    name="density"
    placeholder="Enter Density"
    required>

<label>pH</label>
<input
    type="number"
    step="any"
    name="ph"
    placeholder="Enter pH"
    required>

<label>Sulphates</label>
<input
    type="number"
    step="any"
    name="sulphates"
    placeholder="Enter Sulphates"
    required>

<label>Alcohol</label>
<input
    type="number"
    step="any"
    name="alcohol"
    placeholder="Enter Alcohol"
    required>

<br><br>

<button type="submit">
    Predict Wine Quality
</button>

    </form>
    <h2>{{ prediction_text }}</h2>

</div>

</body>

</html>
